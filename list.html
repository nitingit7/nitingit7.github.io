<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Test</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script type="module">
        import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics/+esm';
        inject();
    </script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <div class="container list-view-container">

        <div class="list-header-wrapper">
            <div class="text-area">
                <h2 id="list-title">Select Test</h2>
                <p class="list-subtitle">Choose a test to start practicing</p>
            </div>

            <div style="position: relative;">
                <button id="btn-filter-toggle" class="btn-filter" onclick="toggleFilterMenu()">
                    <span>🔍</span>
                </button>
                <div id="filter-dropdown" class="filter-dropdown">
                    <div style="padding:10px; border-bottom:1px solid var(--border-color); font-weight:bold; font-size:0.9rem;">
                        Filter by Name
                        <span style="float:right; cursor:pointer;" onclick="toggleFilterMenu()">✖</span>
                    </div>
                    <div id="filter-options-list" class="filter-list"></div>
                    <button class="btn-clear-filter" onclick="clearFilter()">Clear Filter</button>
                </div>
            </div>
        </div>

        <div id="test-container" class="test-list-grid"></div>

        <div id="no-result-msg" style="display:none; color:var(--text-secondary); margin-top:20px; text-align:center;">
            No tests found matching your filter.
        </div>
    </div>

    <script>
        var currentFilter = null;
        var loadedFiles = [];

        window.onload = function () {
            history.pushState(null, null, location.href);
            window.onpopstate = function () { window.location.href = "index.html"; };

            var params = new URLSearchParams(window.location.search);
            var subject = params.get('subject');

            if (subject) localStorage.setItem('last_subject_viewed', subject);

            if (!subject || !GITHUB_FILES[subject]) {
                alert("Invalid Subject"); location.href = 'index.html'; return;
            }

            document.getElementById('list-title').innerText = subject.toUpperCase().replace(/_/g, ' ');

            var list = document.getElementById('test-container');
            loadedFiles = GITHUB_FILES[subject];

            loadedFiles.forEach(function (f) {
                var div = document.createElement('div');
                div.className = 'test-card-modern';

                var tag = f.tags ? f.tags.toLowerCase() : "general";
                div.setAttribute('data-tag', tag);
                div.setAttribute('data-name', f.name.toLowerCase());

                var icon = "📝";
                if (f.name.toLowerCase().includes("speed"))  icon = "⚡";
                if (f.name.toLowerCase().includes("puzzle")) icon = "🧩";
                if (f.name.toLowerCase().includes("full mock")) icon = "🏆";
                if (f.name.toLowerCase().includes("current affairs") || (f.tags && f.tags.includes("Daily"))) icon = "📅";
                if (f.tags && f.tags.includes("Banking")) icon = "🏦";
                if (f.tags && f.tags.includes("Static"))  icon = "🗿";

                var savedResult   = localStorage.getItem(f.file);
                var savedProgress = localStorage.getItem(f.file + '_progress');

                var btnText, btnClass, statusText, statusColor;

                if (savedResult) {
                    btnText = "Analysis"; btnClass = "btn-action btn-result";
                    statusText = "Completed"; statusColor = "var(--green)";
                } else if (savedProgress) {
                    btnText = "Resume"; btnClass = "btn-action btn-resume";
                    statusText = "In Progress"; statusColor = "var(--blue)";
                } else {
                    btnText = "Start"; btnClass = "btn-action btn-list-start";
                    statusText = "Not Attempted"; statusColor = "var(--text-secondary)";
                }

                var metadataHTML = '';
                if (f.questions || f.time || f.marks) {
                    var metaParts = [];
                    if (f.questions) metaParts.push('📝 ' + f.questions + ' Qs');
                    if (f.time)      metaParts.push('⏱ ' + f.time + ' min');
                    if (f.marks)     metaParts.push('🎯 ' + f.marks + ' marks');
                    metadataHTML = '<span class="tc-metadata">' + metaParts.join(' • ') + '</span>';
                }

                div.innerHTML = `
                    <div class="tc-left">
                        <div class="tc-icon">${icon}</div>
                        <div class="tc-info">
                            <span class="tc-title">${f.name}</span>
                            ${metadataHTML}
                            <span class="tc-status" style="color:${statusColor}">${statusText}</span>
                        </div>
                    </div>
                    <button class="${btnClass}">${btnText}</button>
                `;

                div.onclick = function () {
                    if (savedResult) {
                        location.href = "exam.html?showResult=true&file=" + encodeURIComponent(f.file);
                    } else if (savedProgress) {
                        location.href = "exam.html?file=" + encodeURIComponent(f.file);
                    } else {
                        location.href = "instructions.html?file=" + encodeURIComponent(f.file);
                    }
                };

                list.appendChild(div);
            });

            generateDynamicFilters();
        };

        function generateDynamicFilters() {
            var container = document.getElementById('filter-options-list');
            container.innerHTML = '';
            var uniqueTags = new Set();
            loadedFiles.forEach(f => { if (f.tags) uniqueTags.add(f.tags); });
            if (uniqueTags.size === 0) {
                document.getElementById('btn-filter-toggle').style.display = 'none';
                return;
            }
            uniqueTags.forEach(tag => {
                var btn = document.createElement('div');
                btn.className = 'filter-option';
                btn.innerText = tag;
                btn.onclick = function () { applyFilter(tag, btn); };
                container.appendChild(btn);
            });
        }

        function toggleFilterMenu() {
            document.getElementById('filter-dropdown').classList.toggle('show');
        }

        function applyFilter(category, btnElement) {
            currentFilter = category.toLowerCase();
            document.querySelectorAll('.filter-option').forEach(el => el.classList.remove('selected'));
            if (btnElement) btnElement.classList.add('selected');
            document.getElementById('btn-filter-toggle').classList.add('active');
            var items = document.querySelectorAll('.test-card-modern');
            var visibleCount = 0;
            items.forEach(function (item) {
                if (item.getAttribute('data-tag') === currentFilter) {
                    item.style.display = 'flex'; visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });
            document.getElementById('no-result-msg').style.display = visibleCount === 0 ? 'block' : 'none';
            toggleFilterMenu();
        }

        function clearFilter() {
            currentFilter = null;
            document.querySelectorAll('.test-card-modern').forEach(item => item.style.display = 'flex');
            document.querySelectorAll('.filter-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('btn-filter-toggle').classList.remove('active');
            document.getElementById('no-result-msg').style.display = 'none';
            toggleFilterMenu();
        }

        window.onclick = function (event) {
            if (!event.target.matches('.btn-filter') && !event.target.closest('.filter-dropdown') && !event.target.closest('.btn-filter')) {
                var dd = document.getElementById('filter-dropdown');
                if (dd.classList.contains('show')) dd.classList.remove('show');
            }
        };

        window.onpageshow = function (event) { if (event.persisted) window.location.reload(); };
    </script>
</body>
</html>
